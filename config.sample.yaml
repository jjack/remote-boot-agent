# Host configuration details
host:
  # The name of this machine as it will appear in Home Assistant
  name:        "my-remote-pc"
  # The IP address or FQDN used to ping/check if the machine is online
  address:     "192.168.1.50"
  # The MAC address of the network interface for Wake-on-LAN (WOL)
  mac:         "00:11:22:33:44:55"
  # (Optional) Subnet broadcast address for WOL packets (useful for cross-VLAN setups)
  # broadcast_address: "255.255.255.255" # Default if not specified
  # (Optional) The UDP port to send WOL packets to
  # broadcast_port:    9                 # Default if not specified

# Home Assistant integration details
homeassistant:
  # The base URL of your Home Assistant instance
  url:         "https://homeassistant.local:8123"
  # The secret webhook ID generated by the HA Remote Boot integration
  webhook_id:  "your-generated-webhook-id"
  # The UI entity type to create in Home Assistant
  entity_type: "button"

# Bootloader configuration
bootloader:
  # The name of the supported bootloader (e.g., "grub")
  name:        "grub"
  # The absolute path to the bootloader's main configuration file
  config_path: "/boot/grub/grub.cfg"

# OS Init system configuration
initsystem:
  # The name of the supported init system (e.g., "systemd")
  name:        "systemd"

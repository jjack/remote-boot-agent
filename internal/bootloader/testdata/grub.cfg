menuentry 'Windows Boot Manager (on /dev/sda1)' --class windows --class os $menuentry_id_option 'osprober-efi-B392-C663' {
        insmod part_gpt
        insmod fat
        set root='hd0,gpt1'
        if [ x$feature_platform_search_hint = xy ]; then
          search --no-floppy --fs-uuid --set=root --hint-bios=hd0,gpt1 --hint-efi=hd0,gpt1 --hint-baremetal=ahci0,gpt1  B392-C663
        else
          search --no-floppy --fs-uuid --set=root B392-C663
        fi
        chainloader /EFI/Microsoft/Boot/bootmgfw.efi
}
menuentry "Haiku" {
	load_video
	insmod part_msdos
	insmod chain
